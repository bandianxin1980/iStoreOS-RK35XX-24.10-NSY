name: Build iStoreOS BD-ONE RK3568
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 1. 先做极限空间清理（必须放在最前面）
      - name: 极限空间清理
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt clean
          sudo df -h

      # 2. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v5

      # 3. 安装超精简依赖（不使用原仓库的depends文件，避免空间爆炸）
      - name: 安装核心编译依赖
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential libncurses-dev libssl-dev libelf-dev \
            git wget curl unzip bzip2 xz-utils \
            patch make gcc g++ binutils flex bison \
            python3 python3-pip python3-pyelftools
          # 兼容旧脚本
          sudo ln -sf /usr/bin/python3 /usr/bin/python3.6 || true

      # 4. 克隆iStoreOS源码
      - name: 克隆iStoreOS源码
        run: |
          git clone --depth=1 https://github.com/istoreos/istoreos -b istoreos-24.10 openwrt

      # 5. 应用BD-ONE配置
      - name: 应用配置
        run: |
          cp -f armv8/.config openwrt/.config
          chmod +x diy-part1-6.x.sh diy-part2-6.x.sh
          cd openwrt
          ../diy-part1-6.x.sh
          ../diy-part2-6.x.sh

      # 6. 下载软件包
      - name: 下载软件包
        run: |
          cd openwrt
          make defconfig
          make download -j8

      # 7. 编译固件
      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      # 8. 只上传BD-ONE的线刷包
      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: BD-ONE-RK3568-固件
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
